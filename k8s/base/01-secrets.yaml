---
# ⚠️  DO NOT commit real secrets to git.
# Use: kubectl create secret generic busconnect-secret --from-literal=... -n busconnect
# Or deploy via Helm with --set secrets.smtpPass=YOUR_APP_PASSWORD
#
# For local dev only – replace SMTP_PASS before applying.
apiVersion: v1
kind: Secret
metadata:
  name: busconnect-secret
  namespace: busconnect
type: Opaque
stringData:
  DB_PASSWORD:  "buspassword123"
  JWT_SECRET:   "super_secret_jwt_key_bus_platform_2024_change_in_production"
  SMTP_USER:    "contact.busconnect@gmail.com"
  SMTP_PASS:    "REPLACE_WITH_GMAIL_APP_PASSWORD"

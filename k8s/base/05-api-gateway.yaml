---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: busconnect
  labels: { app: api-gateway }
spec:
  replicas: 2
  selector:
    matchLabels: { app: api-gateway }
  template:
    metadata:
      labels: { app: api-gateway }
    spec:
      containers:
        - name: api-gateway
          image: busconnect/api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 8080 }]
          envFrom:
            - configMapRef: { name: busconnect-config }
            - secretRef:    { name: busconnect-secret }
          env:
            - { name: PORT, value: "8080" }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 500m, memory: 256Mi }
          readinessProbe: { httpGet: { path: /health, port: 8080 }, initialDelaySeconds: 10, periodSeconds: 10 }
          livenessProbe:  { httpGet: { path: /health, port: 8080 }, initialDelaySeconds: 20, periodSeconds: 30 }

---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: busconnect
  labels: { app: api-gateway }
spec:
  selector: { app: api-gateway }
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP

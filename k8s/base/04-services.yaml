# ─── Reusable init container snippet (inline for each service) ─────────────────
# Each service waits for postgres before starting.

---
# ══════════════════════════════════════════
# AUTH SERVICE  :3001
# ══════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: busconnect
  labels: { app: auth-service }
spec:
  replicas: 2
  selector:
    matchLabels: { app: auth-service }
  template:
    metadata:
      labels: { app: auth-service }
    spec:
      initContainers:
        - name: wait-postgres
          image: busybox:1.35
          command: ['sh','-c','until nc -z postgres-service 5432; do sleep 2; done']
      containers:
        - name: auth-service
          image: busconnect/auth-service:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 3001 }]
          envFrom:
            - configMapRef:  { name: busconnect-config }
            - secretRef:     { name: busconnect-secret }
          env:
            - { name: PORT, value: "3001" }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 300m, memory: 256Mi }
          readinessProbe: { httpGet: { path: /health, port: 3001 }, initialDelaySeconds: 15, periodSeconds: 10 }
          livenessProbe:  { httpGet: { path: /health, port: 3001 }, initialDelaySeconds: 30, periodSeconds: 30 }
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: busconnect
spec:
  selector: { app: auth-service }
  ports: [{ port: 3001, targetPort: 3001 }]


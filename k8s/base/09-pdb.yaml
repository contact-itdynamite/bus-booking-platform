---
# PodDisruptionBudget ensures rolling updates don't take down all pods
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: booking-service-pdb
  namespace: busconnect
spec:
  minAvailable: 1
  selector:
    matchLabels: { app: booking-service }

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api-gateway-pdb
  namespace: busconnect
spec:
  minAvailable: 1
  selector:
    matchLabels: { app: api-gateway }

---
apiVersion: policy/v1

---
# Ingress requires: kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/cloud/deploy.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: busconnect-ingress
  namespace: busconnect
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size:        "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout:     "60"
    nginx.ingress.kubernetes.io/proxy-connect-timeout:  "10"
    nginx.ingress.kubernetes.io/limit-rps:              "50"
    nginx.ingress.kubernetes.io/use-regex:              "true"
spec:
  ingressClassName: nginx
  rules:
    - host: busconnect.local    # Change to your domain
      http:
        paths:
          # API goes to gateway
          - path: /api/.*
            pathType: ImplementationSpecific
            backend:
              service:
                name: api-gateway
                port: { number: 8080 }
          # Everything else goes to frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port: { number: 80 }

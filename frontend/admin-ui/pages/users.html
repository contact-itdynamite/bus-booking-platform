<main class="main-content">
  <h1 class="page-title">Users</h1>
  <p class="page-subtitle">Manage platform users</p>
  <div style="display:flex;gap:12px;margin-bottom:20px;align-items:center;">
    <input type="text" class="search-bar" id="searchInput" placeholder="Search by name or email..." oninput="load()">
  </div>
  <div class="card">
    <div style="overflow-x:auto;">
      <table class="data-table">
        <thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>Verified</th><th>Status</th><th>Joined</th><th>Actions</th></tr></thead>
        <tbody id="tbody"><tr><td colspan="7" style="text-align:center;padding:32px;color:#6b7280;">Loading...</td></tr></tbody>
      </table>
    </div>
    <div id="pagination"></div>
  </div>
</main>

<script src="../js/app.js"></script>
<script>
let page=1;
async function load(p=1) {
  if (!requireAuth()) return;
  page=p;
  const search=document.getElementById('searchInput').value.trim();
  try {
    let url=`/users?page=${p}&limit=20`;
    if(search) url+=`&search=${encodeURIComponent(search)}`;
    const data=await apiCall(url);
    const users=data.users||[];
    document.getElementById('tbody').innerHTML=users.length?users.map(u=>`
      <tr>
        <td><strong>${u.name}</strong></td>
        <td>${u.email}</td>
        <td>${u.phone||'—'}</td>
        <td>${u.is_verified?'<span class="badge badge-green">Verified</span>':'<span class="badge badge-gray">Pending</span>'}</td>
        <td>${u.is_blocked?'<span class="badge badge-red">Blocked</span>':'<span class="badge badge-green">Active</span>'}</td>
        <td style="font-size:12px;">${fmtDate(u.created_at)}</td>
        <td>
          ${u.is_blocked
            ?`<button class="btn btn-success btn-sm" onclick="toggleBlock('${u.id}',false)">Unblock</button>`
            :`<button class="btn btn-danger btn-sm" onclick="toggleBlock('${u.id}',true)">Block</button>`}
        </td>
      </tr>`).join(''):`<tr><td colspan="7" style="text-align:center;padding:40px;color:#6b7280;">No users found</td></tr>`;
    // Simple pagination
    const total=data.total||0;
    const pages=Math.ceil(total/20);
    let pHtml='<div style="display:flex;gap:6px;justify-content:center;margin-top:16px;">';
    for(let i=1;i<=Math.min(pages,10);i++) pHtml+=`<button onclick="load(${i})" style="padding:6px 12px;border-radius:6px;border:2px solid ${i===p?'#1A56DB':'#e5e7eb'};background:${i===p?'#1A56DB':'white'};color:${i===p?'white':'#111827'};cursor:pointer;font-weight:600;">${i}</button>`;
    pHtml+='</div>';
    document.getElementById('pagination').innerHTML=pages>1?pHtml:'';
  } catch(e) { showToast('Failed: '+e.message,'error'); }
}

async function toggleBlock(id,blocked) {
  try { await apiCall(`/users/${id}/block`,{method:'PATCH',body:{blocked}}); showToast(`User ${blocked?'blocked':'unblocked'}!`,blocked?'warn':'success'); load(page); }
  catch(e) { showToast(e.message,'error'); }
}

load();
</script>

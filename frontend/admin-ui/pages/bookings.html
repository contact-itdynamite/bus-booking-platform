<main class="main-content">
  <h1 class="page-title">All Bookings</h1>
  <p class="page-subtitle">Platform-wide booking management</p>
  <div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;">
    <button class="btn btn-accent btn-sm" onclick="load(1,'')">All</button>
    <button class="btn btn-ghost btn-sm" onclick="load(1,'CONFIRMED')">Confirmed</button>
    <button class="btn btn-ghost btn-sm" onclick="load(1,'PENDING')">Pending</button>
    <button class="btn btn-ghost btn-sm" onclick="load(1,'CANCELLED')">Cancelled</button>
  </div>
  <div class="card" style="padding:0;">
    <div style="overflow-x:auto;">
      <table class="data-table">
        <thead><tr><th>Reference</th><th>User</th><th>Operator</th><th>Route</th><th>Departure</th><th>Amount</th><th>Status</th></tr></thead>
        <tbody id="tbody"><tr><td colspan="7" style="text-align:center;padding:32px;color:#6b7280;">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>
  <div id="pagination"></div>
</main>
<script src="../js/app.js"></script>
<script>
let page=1, status='';
const bm={CONFIRMED:'badge-green',PENDING:'badge-orange',CANCELLED:'badge-red',COMPLETED:'badge-blue'};

async function load(p=1,s='') {
  if(!requireAuth())return;
  page=p; status=s;
  try {
    let url=`/bookings/admin/all?page=${p}&limit=20`;
    if(s) url+=`&status=${s}`;
    const data=await apiCall(url);
    const bookings=data.bookings||[];
    document.getElementById('tbody').innerHTML=bookings.length?bookings.map(b=>`
      <tr>
        <td><strong style="color:#1A56DB;font-size:12px;">${b.booking_reference}</strong></td>
        <td style="font-size:12px;">${b.user_name}<br><span style="color:#6b7280;">${b.user_email}</span></td>
        <td style="font-size:12px;">${b.operator_name}</td>
        <td style="font-size:12px;">${b.source_city} → ${b.destination_city}</td>
        <td style="font-size:11px;">${fmtDateTime(b.departure_time)}</td>
        <td><strong>${fmtINR(b.final_amount)}</strong></td>
        <td><span class="badge ${bm[b.status]||'badge-gray'}">${b.status}</span></td>
      </tr>`).join(''):`<tr><td colspan="7" style="text-align:center;padding:40px;color:#6b7280;">No bookings found</td></tr>`;
    const total=data.total||0;
    const pages=Math.ceil(total/20);
    let ph='<div style="display:flex;gap:6px;justify-content:center;margin-top:16px;">';
    for(let i=1;i<=Math.min(pages,10);i++) ph+=`<button onclick="load(${i},'${status}')" style="padding:6px 12px;border-radius:6px;border:2px solid ${i===p?'#1A56DB':'#e5e7eb'};background:${i===p?'#1A56DB':'white'};color:${i===p?'white':'#111827'};cursor:pointer;font-weight:600;">${i}</button>`;
    ph+='</div>';
    document.getElementById('pagination').innerHTML=pages>1?ph:'';
  } catch(e){showToast('Failed: '+e.message,'error');}
}
load();
</script>

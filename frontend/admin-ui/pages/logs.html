<main class="main-content">
  <h1 class="page-title">System Logs</h1>
  <p class="page-subtitle">Real-time platform activity monitoring</p>

  <div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;align-items:center;">
    <select id="levelFilter" class="search-bar" style="min-width:140px;" onchange="load()">
      <option value="">All Levels</option>
      <option value="info">Info</option>
      <option value="warn">Warning</option>
      <option value="error">Error</option>
      <option value="debug">Debug</option>
    </select>
    <select id="serviceFilter" class="search-bar" style="min-width:180px;" onchange="load()">
      <option value="">All Services</option>
      <option value="auth-service">auth-service</option>
      <option value="booking-service">booking-service</option>
      <option value="wallet-service">wallet-service</option>
      <option value="operator-service">operator-service</option>
      <option value="promo-service">promo-service</option>
    </select>
    <button class="btn btn-ghost btn-sm" onclick="load()">🔄 Refresh</button>
  </div>

  <div class="card" style="padding:0;overflow:hidden;">
    <div style="overflow-x:auto;">
      <table class="data-table">
        <thead><tr><th>Time</th><th>Level</th><th>Service</th><th>Message</th></tr></thead>
        <tbody id="tbody"><tr><td colspan="4" style="text-align:center;padding:32px;color:#6b7280;">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>
  <div id="pagination"></div>
</main>

<script src="../js/app.js"></script>
<script>
let page=1;
const levelColors={info:'badge-blue',warn:'badge-orange',error:'badge-red',debug:'badge-gray'};

async function load(p=1) {
  if (!requireAuth()) return;
  page=p;
  const level=document.getElementById('levelFilter').value;
  const service=document.getElementById('serviceFilter').value;
  let url=`/admin/logs?page=${p}&limit=50`;
  if(level) url+=`&level=${level}`;
  if(service) url+=`&service=${service}`;
  try {
    const data=await apiCall(url);
    const logs=data.logs||[];
    document.getElementById('tbody').innerHTML=logs.length?logs.map(l=>`
      <tr>
        <td style="font-size:11px;white-space:nowrap;color:#6b7280;">${fmtDateTime(l.created_at)}</td>
        <td><span class="badge ${levelColors[l.level]||'badge-gray'}">${l.level}</span></td>
        <td style="font-size:12px;font-family:monospace;color:#6b7280;">${l.service}</td>
        <td style="font-size:13px;max-width:500px;">${l.message}</td>
      </tr>`).join(''):`<tr><td colspan="4" style="text-align:center;padding:40px;color:#6b7280;">No logs found</td></tr>`;

    const total=data.total||0;
    const pages=Math.ceil(total/50);
    let ph='<div style="display:flex;gap:6px;justify-content:center;margin-top:16px;">';
    for(let i=1;i<=Math.min(pages,8);i++) ph+=`<button onclick="load(${i})" style="padding:6px 12px;border-radius:6px;border:2px solid ${i===p?'#1A56DB':'#e5e7eb'};background:${i===p?'#1A56DB':'white'};color:${i===p?'white':'#111827'};cursor:pointer;font-weight:600;">${i}</button>`;
    ph+='</div>';
    document.getElementById('pagination').innerHTML=pages>1?ph:'';
  } catch(e) { showToast('Failed: '+e.message,'error'); }
}

load();
setInterval(()=>load(page), 30000); // auto-refresh every 30s
</script>

<body>

<main class="main-content">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
    <div><h1 class="page-title">Promo Codes</h1><p class="page-subtitle">Manage discounts and promotional offers</p></div>
    <button class="btn btn-accent" onclick="document.getElementById('promoModal').classList.add('active')">+ Create Promo</button>
  </div>
  <div class="card">
    <div style="overflow-x:auto;">
      <table class="data-table">
        <thead><tr><th>Code</th><th>Type</th><th>Discount</th><th>Usage</th><th>Valid Until</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody id="tbody"><tr><td colspan="7" style="text-align:center;padding:32px;color:#6b7280;">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>
</main>

<div class="modal-overlay" id="promoModal">
  <div class="modal">
    <button class="modal-close" onclick="document.getElementById('promoModal').classList.remove('active')">×</button>
    <h2 class="modal-title">Create Promo Code</h2>
    <div id="promoAlert" class="alert alert-error" style="display:none;"></div>
    <div class="form-grid">
      <div class="form-group"><label>Code *</label><input type="text" id="pCode" placeholder="SAVE50" style="text-transform:uppercase;"></div>
      <div class="form-group">
        <label>Type *</label>
        <select id="pType">
          <option value="GLOBAL">Global (all users)</option>
          <option value="USER_SPECIFIC">User Specific</option>
        </select>
      </div>
    </div>
    <div id="userIdRow" style="display:none;" class="form-group"><label>User Email (for user-specific)</label><input type="text" id="pUserId" placeholder="user@email.com"></div>
    <div class="form-group"><label>Description</label><input type="text" id="pDesc" placeholder="Get ₹50 off on your next booking"></div>
    <div class="form-grid">
      <div class="form-group">
        <label>Discount Type *</label>
        <select id="pDiscType">
          <option value="FLAT">Flat Amount (₹)</option>
          <option value="PERCENTAGE">Percentage (%)</option>
          <option value="CREDITS">Credits</option>
        </select>
      </div>
      <div class="form-group"><label>Discount Value *</label><input type="number" id="pDiscVal" placeholder="50" min="1"></div>
    </div>
    <div class="form-grid">
      <div class="form-group"><label>Max Discount (₹)</label><input type="number" id="pMaxDisc" placeholder="Optional"></div>
      <div class="form-group"><label>Min Booking (₹)</label><input type="number" id="pMinBook" placeholder="0"></div>
    </div>
    <div class="form-group"><label>Usage Limit</label><input type="number" id="pUseLim" placeholder="Unlimited"></div>
    <div class="form-grid">
      <div class="form-group"><label>Valid From *</label><input type="datetime-local" id="pFrom"></div>
      <div class="form-group"><label>Valid Until *</label><input type="datetime-local" id="pUntil"></div>
    </div>
    <button class="btn btn-accent btn-block" onclick="createPromo()">Create Promo Code</button>
  </div>
</div>

<script src="../js/app.js"></script>
<script>
document.getElementById('pType').onchange = function() {
  document.getElementById('userIdRow').style.display = this.value==='USER_SPECIFIC'?'':'none';
};

// Set default dates
const now = new Date(); const later = new Date(now.getTime() + 30*24*60*60*1000);
document.getElementById('pFrom').value = now.toISOString().slice(0,16);
document.getElementById('pUntil').value = later.toISOString().slice(0,16);

async function loadPromos() {
  if (!requireAuth()) return;
  try {
    const promos = await apiCall('/promos');
    const dm = { GLOBAL:'badge-blue', USER_SPECIFIC:'badge-purple' };
    document.getElementById('tbody').innerHTML = promos.length ? promos.map(p=>`
      <tr>
        <td>
          <div style="font-family:monospace;font-size:15px;font-weight:700;color:#1A56DB;">${p.code}</div>
          <div style="font-size:12px;color:#6b7280;">${p.description||'—'}</div>
        </td>
        <td><span class="badge ${dm[p.type]||'badge-gray'}">${p.type.replace('_',' ')}</span></td>
        <td>
          <strong>${p.discount_type==='FLAT'?`₹${p.discount_value}`:p.discount_type==='PERCENTAGE'?`${p.discount_value}%`:`₹${p.discount_value} credits`}</strong>
          ${p.max_discount?`<div style="font-size:11px;color:#6b7280;">max ₹${p.max_discount}</div>`:''}
        </td>
        <td>${p.used_count}${p.usage_limit?` / ${p.usage_limit}`:' / ∞'}</td>
        <td style="font-size:12px;">${fmtDate(p.valid_until)}</td>
        <td><span class="badge ${p.is_active?'badge-green':'badge-red'}">${p.is_active?'Active':'Inactive'}</span></td>
        <td style="display:flex;gap:4px;">
          <button class="btn btn-sm ${p.is_active?'btn-warn':'btn-success'}" onclick="togglePromo('${p.id}')">${p.is_active?'Deactivate':'Activate'}</button>
          <button class="btn btn-danger btn-sm" onclick="deletePromo('${p.id}')">Delete</button>
        </td>
      </tr>`).join(''):`<tr><td colspan="7" style="text-align:center;padding:40px;color:#6b7280;"><div style="font-size:40px;margin-bottom:12px;">🎁</div>No promo codes yet</td></tr>`;
  } catch(e) { showToast('Failed: '+e.message,'error'); }
}

async function createPromo() {
  const alertEl=document.getElementById('promoAlert');
  const payload={
    code:document.getElementById('pCode').value.trim().toUpperCase(),
    type:document.getElementById('pType').value,
    description:document.getElementById('pDesc').value,
    discount_type:document.getElementById('pDiscType').value,
    discount_value:parseFloat(document.getElementById('pDiscVal').value),
    max_discount:document.getElementById('pMaxDisc').value||null,
    min_booking_amount:document.getElementById('pMinBook').value||0,
    usage_limit:document.getElementById('pUseLim').value||null,
    valid_from:document.getElementById('pFrom').value,
    valid_until:document.getElementById('pUntil').value
  };
  if(!payload.code||!payload.discount_value||!payload.valid_from||!payload.valid_until){alertEl.textContent='Fill required fields';alertEl.style.display='';return;}
  alertEl.style.display='none';
  try {
    await apiCall('/promos',{method:'POST',body:payload});
    showToast('Promo created!','success');
    document.getElementById('promoModal').classList.remove('active');
    loadPromos();
  } catch(e){alertEl.textContent=e.message;alertEl.style.display='';}
}

async function togglePromo(id) {
  try { await apiCall(`/promos/${id}/toggle`,{method:'PATCH'}); loadPromos(); } catch(e){showToast(e.message,'error');}
}
async function deletePromo(id) {
  if(!confirm('Delete this promo?'))return;
  try { await apiCall(`/promos/${id}`,{method:'DELETE'}); showToast('Deleted','success'); loadPromos(); } catch(e){showToast(e.message,'error');}
}

loadPromos();
</script>
</body>
</html>

<main class="main-content">
  <h1 class="page-title">Operators</h1>
  <p class="page-subtitle">Manage bus operators and approvals</p>

  <div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;align-items:center;">
    <button class="btn btn-accent btn-sm" onclick="load('pending')" id="tab-pending">⏳ Pending Approval</button>
    <button class="btn btn-ghost btn-sm" onclick="load('approved')" id="tab-approved">✅ Approved</button>
    <button class="btn btn-ghost btn-sm" onclick="load('blocked')" id="tab-blocked">🚫 Blocked</button>
    <button class="btn btn-ghost btn-sm" onclick="load('')" id="tab-all">All</button>
  </div>

  <div class="card">
    <div style="overflow-x:auto;">
      <table class="data-table">
        <thead><tr><th>Company</th><th>Contact</th><th>GST / License</th><th>Rating</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody id="tbody"><tr><td colspan="6" style="text-align:center;padding:32px;color:#6b7280;">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>
</main>

<script src="../js/app.js"></script>
<script>
let currentStatus = 'pending';

async function load(status='pending') {
  if (!requireAuth()) return;
  currentStatus = status;
  ['pending','approved','blocked','all'].forEach(s => {
    const el=document.getElementById(`tab-${s}`); if(el) el.className='btn btn-ghost btn-sm';
  });
  const activeTab = document.getElementById(`tab-${status||'all'}`);
  if (activeTab) activeTab.className='btn btn-accent btn-sm';

  try {
    let url = '/operators?limit=50';
    if (status) url += `&status=${status}`;
    const data = await apiCall(url);
    const ops = data.operators || data;
    document.getElementById('tbody').innerHTML = ops.length ? ops.map(op=>`
      <tr>
        <td>
          <div style="font-weight:700;">${op.company_name}</div>
          <div style="font-size:12px;color:#6b7280;">${op.name}</div>
        </td>
        <td>
          <div style="font-size:13px;">${op.email}</div>
          <div style="font-size:12px;color:#6b7280;">${op.phone||'—'}</div>
        </td>
        <td style="font-size:12px;color:#6b7280;">${op.gst_number||'—'}<br>${op.license_number||'—'}</td>
        <td>${op.rating > 0 ? `⭐ ${parseFloat(op.rating).toFixed(1)} (${op.total_ratings})` : '—'}</td>
        <td>
          <span class="badge ${op.is_blocked?'badge-red':op.is_approved?'badge-green':op.is_verified?'badge-orange':'badge-gray'}">
            ${op.is_blocked?'Blocked':op.is_approved?'Approved':op.is_verified?'Pending':'Unverified'}
          </span>
        </td>
        <td>
          <div style="display:flex;gap:4px;flex-wrap:wrap;">
            ${!op.is_approved && !op.is_blocked ? `<button class="btn btn-success btn-sm" onclick="approve('${op.id}',true)">Approve</button>` : ''}
            ${op.is_approved && !op.is_blocked ? `<button class="btn btn-warn btn-sm" onclick="approve('${op.id}',false)">Unapprove</button>` : ''}
            ${!op.is_blocked ? `<button class="btn btn-danger btn-sm" onclick="block('${op.id}',true)">Block</button>` : `<button class="btn btn-success btn-sm" onclick="block('${op.id}',false)">Unblock</button>`}
          </div>
        </td>
      </tr>`).join('') : `<tr><td colspan="6" style="text-align:center;padding:40px;color:#6b7280;"><div style="font-size:40px;margin-bottom:12px;">🚌</div>No operators found</td></tr>`;
  } catch(e) { showToast('Failed: '+e.message,'error'); }
}

async function approve(id, approved) {
  try {
    await apiCall(`/operators/${id}/approve`, { method:'PATCH', body:{ approved } });
    showToast(`Operator ${approved?'approved':'unapproved'}!`, 'success');
    load(currentStatus);
  } catch(e) { showToast(e.message,'error'); }
}

async function block(id, blocked) {
  try {
    await apiCall(`/operators/${id}/block`, { method:'PATCH', body:{ blocked } });
    showToast(`Operator ${blocked?'blocked':'unblocked'}!`, blocked?'warn':'success');
    load(currentStatus);
  } catch(e) { showToast(e.message,'error'); }
}

load('pending');
</script>

  <title>Login – BusConnect</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

</head>
<body>
<nav class="navbar" id="navbar">
  <div class="nav-container">
    <a href="../index.html" class="nav-logo">🚌 BusConnect</a>
    <div class="nav-auth">
      <a href="register.html" class="btn btn-primary">Sign Up</a>
    </div>
  </div>
</nav>

<div class="form-page">
  <div class="form-card">
    <div class="form-logo">🚌 BusConnect</div>
    <h1 class="form-title">Welcome back</h1>
    <p class="form-sub">Sign in to continue your journey</p>

    <div id="errorAlert" class="alert alert-error" style="display:none"></div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <div style="position:relative;">
        <input type="password" id="password" placeholder="Enter password" autocomplete="current-password"
               onkeypress="if(event.key==='Enter')doLogin()" style="padding-right:44px;">
        <button type="button" onclick="togglePwd()" id="pwdToggle"
          style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:18px;line-height:1;">👁️</button>
      </div>
    </div>

    <button class="btn btn-primary btn-block btn-lg" onclick="doLogin()" id="loginBtn">Sign In</button>

    <div class="form-divider" style="margin-top:20px">
      Don't have an account? <a href="register.html" class="form-link">Create one</a>
    </div>
    <div class="form-divider">
      Are you an operator? <a href="../../operator-ui/pages/login.html" class="form-link">Operator Login</a>
    </div>
  </div>
</div>

<script src="../js/auth.js"></script>
<script>
function togglePwd() {
  const inp = document.getElementById('password');
  const btn = document.getElementById('pwdToggle');
  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
  else { inp.type = 'password'; btn.textContent = '👁️'; }
}
async function doLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errorAlert = document.getElementById('errorAlert');
  const btn = document.getElementById('loginBtn');

  if (!email || !password) { errorAlert.textContent = 'Please fill all fields'; errorAlert.style.display=''; return; }
  errorAlert.style.display = 'none';
  btn.disabled = true; btn.textContent = 'Signing in...';

  try {
    const data = await apiCall('/auth/user/login', { method: 'POST', body: { email, password } });
    setAuth(data.token, data.user);
    showToast('Login successful! Welcome back.', 'success');
    setTimeout(() => window.location.href = '../index.html', 800);
  } catch (err) {
    errorAlert.textContent = err.message;
    errorAlert.style.display = '';
    btn.disabled = false; btn.textContent = 'Sign In';
  }
}
</script>
</body>

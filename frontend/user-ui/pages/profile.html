<div class="page-header">
  <div class="container"><h1>My Profile</h1><p>Manage your account details</p></div>
</div>

<div class="page-content">
  <div style="max-width:600px;margin:0 auto;">
    <div class="card" style="margin-bottom:24px;">
      <h3 class="card-title">Personal Information</h3>
      <div id="profileAlert" class="alert alert-success" style="display:none;"></div>
      <div class="form-group"><label>Full Name</label><input type="text" id="pName" placeholder="Your name"></div>
      <div class="form-group"><label>Email</label><input type="email" id="pEmail" disabled style="background:var(--bg);cursor:not-allowed;"></div>
      <div class="form-group"><label>Phone</label><input type="tel" id="pPhone" placeholder="+91 98765 43210"></div>
      <button class="btn btn-primary" onclick="saveProfile()" id="saveBtn">Save Changes</button>
    </div>

    <div class="card">
      <h3 class="card-title">Change Password</h3>
      <div id="pwAlert" class="alert" style="display:none;"></div>
      <div class="form-group"><label>Current Password</label><input type="password" id="curPw" placeholder="Current password"></div>
      <div class="form-group"><label>New Password</label><input type="password" id="newPw" placeholder="Min 6 characters"></div>
      <button class="btn btn-outline" onclick="changePassword()">Update Password</button>
    </div>
  </div>
</div>

<script src="../js/auth.js"></script>
<script>
async function init() {
  if (!requireAuth()) return;
  try {
    const u = await apiCall('/users/profile');
    document.getElementById('pName').value = u.name || '';
    document.getElementById('pEmail').value = u.email || '';
    document.getElementById('pPhone').value = u.phone || '';
  } catch(e) { showToast('Failed to load profile', 'error'); }
}

async function saveProfile() {
  const name = document.getElementById('pName').value.trim();
  const phone = document.getElementById('pPhone').value.trim();
  const btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = 'Saving...';
  try {
    await apiCall('/users/profile', { method: 'PUT', body: { name, phone } });
    const alert = document.getElementById('profileAlert');
    alert.textContent = 'Profile updated successfully!'; alert.style.display='';
    setTimeout(() => alert.style.display='none', 3000);
  } catch(err) { showToast(err.message, 'error'); }
  btn.disabled = false; btn.textContent = 'Save Changes';
}

async function changePassword() {
  const cur = document.getElementById('curPw').value;
  const nw = document.getElementById('newPw').value;
  const pwAlert = document.getElementById('pwAlert');
  if (!cur || !nw) { pwAlert.textContent='Both fields required'; pwAlert.className='alert alert-error'; pwAlert.style.display=''; return; }
  if (nw.length < 6) { pwAlert.textContent='Min 6 characters'; pwAlert.className='alert alert-error'; pwAlert.style.display=''; return; }
  try {
    await apiCall('/users/change-password', { method: 'PUT', body: { current_password: cur, new_password: nw } });
    pwAlert.textContent = 'Password updated!'; pwAlert.className='alert alert-success'; pwAlert.style.display='';
    document.getElementById('curPw').value=''; document.getElementById('newPw').value='';
  } catch(err) { pwAlert.textContent=err.message; pwAlert.className='alert alert-error'; pwAlert.style.display=''; }
}

init();
</script>

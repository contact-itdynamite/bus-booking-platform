<body>
<nav class="navbar" id="navbar">
  <div class="nav-container">
    <a href="../index.html" class="nav-logo">🚌 BusConnect</a>
    <div class="nav-links">
      <a href="search.html">Search Buses</a>
      <a href="wallet.html" style="color:var(--blue);">Wallet</a>
      <a href="bookings.html">My Bookings</a>
      <a href="profile.html">Profile</a>
    </div>
    <div class="nav-auth">
      <div id="guestNav"><a href="login.html" class="btn btn-ghost">Login</a></div>
      <div id="userNav" style="display:none;align-items:center;gap:10px;">
        <a href="../pages/wallet.html" class="wallet-badge" id="navBalance">₹0</a>
        <button class="btn btn-ghost btn-sm" onclick="logout()">Logout</button>
      </div>
    </div>
  </div>
</nav>

<div class="page-header">
  <div class="container"><h1>My Wallet</h1><p>Credits balance &amp; transaction history</p></div>
</div>

<div class="page-content">
  <div style="max-width:900px;margin:0 auto;">
    <!-- Wallet Card -->
    <div class="wallet-card">
      <div class="wallet-icon">💰</div>
      <div class="wallet-label">Available Balance</div>
      <div class="wallet-balance"><span class="wallet-currency">₹</span><span id="balanceAmt">—</span></div>
      <div style="margin-top:16px;font-size:14px;opacity:0.8;" id="walletMeta"></div>
    </div>

    <!-- Promo redeem -->
    <div class="card" style="margin-bottom:24px;">
      <h3 class="card-title">🎁 Redeem Promo Code</h3>
      <div style="display:flex;gap:12px;">
        <input type="text" id="promoCode" placeholder="Enter promo code" style="flex:1;padding:12px 16px;border:2px solid var(--border);border-radius:8px;font-family:inherit;font-size:15px;outline:none;text-transform:uppercase;">
        <button class="btn btn-primary" onclick="checkPromo()">Check Code</button>
      </div>
      <div id="promoResult" style="margin-top:10px;font-size:14px;"></div>
    </div>

    <!-- Transactions -->
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
        <h3 class="card-title" style="margin:0;">Transaction History</h3>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-ghost btn-sm" onclick="loadTx(1,'CREDIT')" id="txCredit">Credits</button>
          <button class="btn btn-ghost btn-sm" onclick="loadTx(1,'DEBIT')" id="txDebit">Debits</button>
          <button class="btn btn-primary btn-sm" onclick="loadTx(1,'')" id="txAll">All</button>
        </div>
      </div>
      <div id="txContainer"><div class="spinner"></div></div>
      <div id="txPagination"></div>
    </div>
  </div>
</div>

<script src="../js/auth.js"></script>
<script>
let txFilter = '';

async function init() {
  if (!requireAuth()) return;
  try {
    const w = await apiCall('/wallet/balance');
    document.getElementById('balanceAmt').textContent = parseFloat(w.balance).toLocaleString('en-IN');
    document.getElementById('navBalance').textContent = `₹${parseFloat(w.balance).toLocaleString('en-IN')}`;
    document.getElementById('walletMeta').textContent = `${w.transaction_count||0} total transactions`;
  } catch(e) {}
  loadTx(1,'');
}

async function loadTx(page=1, filter='') {
  txFilter = filter;
  ['txAll','txCredit','txDebit'].forEach(id => document.getElementById(id).className='btn btn-ghost btn-sm');
  if (!filter) document.getElementById('txAll').className='btn btn-primary btn-sm';
  else if (filter==='CREDIT') document.getElementById('txCredit').className='btn btn-primary btn-sm';
  else document.getElementById('txDebit').className='btn btn-primary btn-sm';

  try {
    const data = await apiCall(`/wallet/transactions?page=${page}&limit=15`);
    let txs = data.transactions;
    if (filter) txs = txs.filter(t => t.type === filter);
    renderTx(txs);
    renderPagination(document.getElementById('txPagination'), page, data.total, 15, p => loadTx(p, txFilter));
  } catch(e) {
    document.getElementById('txContainer').innerHTML = '<p style="text-align:center;color:var(--text-muted);">Failed to load transactions</p>';
  }
}

function renderTx(txs) {
  if (!txs.length) {
    document.getElementById('txContainer').innerHTML = '<div class="empty-state" style="padding:40px;"><div class="empty-icon">📋</div><h3>No transactions yet</h3></div>';
    return;
  }
  document.getElementById('txContainer').innerHTML = `
    <table class="data-table">
      <thead><tr><th>Date</th><th>Description</th><th>Reference</th><th>Amount</th><th>Balance</th></tr></thead>
      <tbody>
        ${txs.map(t => `<tr>
          <td style="font-size:13px;">${fmtDateTime(t.created_at)}</td>
          <td>${t.description || t.reference_type || '—'}</td>
          <td style="font-size:12px;color:var(--text-muted);">${t.reference_type||'—'}</td>
          <td style="font-weight:700;color:${t.type==='CREDIT'?'var(--success)':'var(--error)'};">
            ${t.type==='CREDIT'?'+':'−'}${fmtINR(t.amount)}
          </td>
          <td style="font-weight:600;">${fmtINR(t.balance_after)}</td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}

async function checkPromo() {
  const code = document.getElementById('promoCode').value.trim().toUpperCase();
  if (!code) { showToast('Enter a promo code', 'warn'); return; }
  try {
    const data = await apiCall('/promos/validate', { method: 'POST', body: { code } });
    document.getElementById('promoResult').innerHTML = `
      <div class="alert alert-success">
        ✅ <strong>${code}</strong> is valid! 
        ${data.promo.discount_type === 'FLAT' ? `Flat ₹${data.promo.discount_value} off` : 
          data.promo.discount_type === 'PERCENTAGE' ? `${data.promo.discount_value}% off (max ₹${data.promo.max_discount||'unlimited'})` :
          `₹${data.promo.discount_value} credits`}
        — Apply during checkout!
      </div>`;
  } catch (err) {
    document.getElementById('promoResult').innerHTML = `<div class="alert alert-error">❌ ${err.message}</div>`;
  }
}

init();
</script>
</body>
</html>

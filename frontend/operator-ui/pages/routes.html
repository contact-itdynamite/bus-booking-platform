<body>
<aside class="sidebar">
  <div class="sidebar-logo">🚌 Bus<span>Connect</span></div>
  <nav class="sidebar-nav">

  </nav>
  <div class="sidebar-footer">
    <div class="sidebar-user" id="sidebarUser"><strong>Operator</strong></div>
    <button class="btn btn-ghost btn-sm" onclick="logout()" style="width:100%;">Logout</button>
  </div>
</aside>
<main class="main-content">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
    <div><h1 class="page-title">Routes</h1><p class="page-subtitle">Manage your bus routes</p></div>
    <button class="btn btn-accent" onclick="document.getElementById('routeModal').classList.add('active')">+ Add Route</button>
  </div>
  <div class="card" id="routesCard"><div style="text-align:center;padding:40px;">Loading...</div></div>
</main>

<div class="modal-overlay" id="routeModal">
  <div class="modal">
    <button class="modal-close" onclick="document.getElementById('routeModal').classList.remove('active')">×</button>
    <h2 class="modal-title">Add Route</h2>
    <div id="routeAlert" class="alert alert-error" style="display:none;"></div>
    <div class="form-grid">
      <div class="form-group"><label>Source City *</label><input type="text" id="src" placeholder="Mumbai" list="cl"><datalist id="cl"><option value="Mumbai"><option value="Delhi"><option value="Bangalore"><option value="Hyderabad"><option value="Chennai"><option value="Pune"><option value="Jaipur"></datalist></div>
      <div class="form-group"><label>Destination City *</label><input type="text" id="dst" placeholder="Pune" list="cl2"><datalist id="cl2"><option value="Mumbai"><option value="Delhi"><option value="Bangalore"><option value="Hyderabad"><option value="Chennai"><option value="Pune"><option value="Jaipur"></datalist></div>
    </div>
    <div class="form-grid">
      <div class="form-group"><label>Distance (km)</label><input type="number" id="dist" placeholder="150"></div>
      <div class="form-group"><label>Duration (mins)</label><input type="number" id="dur" placeholder="180"></div>
    </div>
    <button class="btn btn-accent btn-block" onclick="saveRoute()">Add Route</button>
  </div>
</div>

<script src="../js/app.js"></script>
<script>
async function loadRoutes() {
  if (!requireAuth()) return;
  try {
    const routes = await apiCall('/operators/routes');
    const card = document.getElementById('routesCard');
    if (!routes.length) { card.innerHTML = '<div style="text-align:center;padding:60px;color:#64748b;"><div style="font-size:48px;">🗺️</div><h3 style="font-family:Syne,sans-serif;margin-top:12px;">No routes yet</h3></div>'; return; }
    card.innerHTML = `<table class="data-table"><thead><tr><th>Source</th><th>Destination</th><th>Distance</th><th>Duration</th><th>Status</th><th>Actions</th></tr></thead><tbody>
      ${routes.map(r => `<tr>
        <td><strong>${r.source_city}</strong></td>
        <td><strong>${r.destination_city}</strong></td>
        <td>${r.distance_km ? r.distance_km + ' km' : '—'}</td>
        <td>${r.duration_minutes ? Math.floor(r.duration_minutes/60) + 'h ' + (r.duration_minutes%60) + 'm' : '—'}</td>
        <td><span class="badge ${r.is_active?'badge-green':'badge-red'}">${r.is_active?'Active':'Inactive'}</span></td>
        <td><button class="btn btn-sm" style="background:#fee2e2;color:#991b1b;" onclick="toggleRoute('${r.id}',${r.is_active})">${r.is_active?'Deactivate':'Activate'}</button></td>
      </tr>`).join('')}
    </tbody></table>`;
  } catch(e) { showToast('Failed: '+e.message,'error'); }
}

async function saveRoute() {
  const src = document.getElementById('src').value.trim();
  const dst = document.getElementById('dst').value.trim();
  const dist = document.getElementById('dist').value;
  const dur = document.getElementById('dur').value;
  const alertEl = document.getElementById('routeAlert');
  if (!src||!dst) { alertEl.textContent='Source and destination required'; alertEl.style.display=''; return; }
  alertEl.style.display='none';
  try {
    await apiCall('/operators/routes', { method:'POST', body:{ source_city:src, destination_city:dst, distance_km:dist||null, duration_minutes:dur||null } });
    showToast('Route added!','success');
    document.getElementById('routeModal').classList.remove('active');
    loadRoutes();
  } catch(e) { alertEl.textContent=e.message; alertEl.style.display=''; }
}

async function toggleRoute(id, active) {
  try { await apiCall(`/operators/routes/${id}`, { method:'PUT', body:{ is_active:!active, source_city:'', destination_city:'' } }); loadRoutes(); }
  catch(e) { showToast(e.message,'error'); }
}

loadRoutes();
</script>

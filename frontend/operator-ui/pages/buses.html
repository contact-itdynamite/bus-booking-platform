<body>
<aside class="sidebar">
  <div class="sidebar-logo">🚌 Bus<span>Connect</span></div>

    <a href="dashboard.html"><span class="icon">📊</span><span>Dashboard</span></a>

  </div>
</aside>

<main class="main-content">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
    <div><h1 class="page-title">My Buses</h1><p class="page-subtitle">Manage your fleet</p></div>
    <button class="btn btn-accent" onclick="openModal()">+ Add Bus</button>
  </div>

  <div class="card">
    <div id="busesContainer"><div style="text-align:center;padding:40px;"><div class="spinner" style="border-color:#e2e8f0;border-top-color:#2557a7;"></div></div></div>
  </div>
</main>

<!-- Add Bus Modal -->
<div class="modal-overlay" id="busModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">×</button>
    <h2 class="modal-title" id="modalTitle">Add New Bus</h2>
    <div id="modalAlert" class="alert alert-error" style="display:none;"></div>
    <div class="form-grid">
      <div class="form-group"><label>Bus Name *</label><input type="text" id="busName" placeholder="e.g. Saptashri Express"></div>
      <div class="form-group"><label>Bus Number *</label><input type="text" id="busNum" placeholder="e.g. MH-12-AB-1234"></div>
    </div>
    <div class="form-grid">
      <div class="form-group">
        <label>Bus Type *</label>
        <select id="busType">
          <option value="">Select type</option>
          <option value="AC">AC</option>
          <option value="NON_AC">Non-AC</option>
          <option value="SLEEPER">Sleeper</option>
          <option value="SEMI_SLEEPER">Semi Sleeper</option>
          <option value="VOLVO">Volvo</option>
          <option value="LUXURY">Luxury</option>
        </select>
      </div>
      <div class="form-group">
        <label>Seating Type *</label>
        <select id="seatType">
          <option value="SEATER">Seater</option>
          <option value="SLEEPER">Sleeper</option>
          <option value="BOTH">Both</option>
        </select>
      </div>
    </div>
    <div class="form-group"><label>Total Seats *</label><input type="number" id="totalSeats" placeholder="e.g. 40" min="1" max="60"></div>
    <div class="form-group">
      <label>Amenities (comma separated)</label>
      <input type="text" id="amenities" placeholder="WiFi, Charging Point, Blanket, Water Bottle">
    </div>
    <button class="btn btn-accent btn-block" id="saveBusBtn" onclick="saveBus()">Add Bus</button>
  </div>
</div>

<script src="../js/app.js"></script>
<script>
let editId = null;

async function loadBuses() {
  if (!requireAuth()) return;
  try {
    const buses = await apiCall('/operators/buses');
    const container = document.getElementById('busesContainer');
    if (!buses.length) { container.innerHTML = '<div style="text-align:center;padding:60px;color:#64748b;"><div style="font-size:48px;margin-bottom:12px;">🚌</div><h3 style="font-family:Syne,sans-serif;">No buses yet</h3><p>Add your first bus to start accepting bookings.</p></div>'; return; }
    container.innerHTML = `<div style="overflow-x:auto;"><table class="data-table">
      <thead><tr><th>Bus Name</th><th>Number</th><th>Type</th><th>Seats</th><th>Amenities</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody>
        ${buses.map(b => `<tr>
          <td><strong>${b.bus_name}</strong></td>
          <td><code>${b.bus_number}</code></td>
          <td><span class="badge badge-blue">${b.bus_type}</span> <span class="badge badge-gray">${b.seating_type}</span></td>
          <td>${b.total_seats}</td>
          <td style="font-size:12px;color:#64748b;">${(Array.isArray(b.amenities)?b.amenities:JSON.parse(b.amenities||'[]')).join(', ')||'—'}</td>
          <td><span class="badge ${b.is_active?'badge-green':'badge-red'}">${b.is_active?'Active':'Inactive'}</span></td>
          <td style="display:flex;gap:6px;">
            <button class="btn btn-ghost btn-sm" onclick="editBus(${JSON.stringify(b).replace(/"/g,'&quot;')})">Edit</button>
            <button class="btn btn-sm" style="background:#fee2e2;color:#991b1b;" onclick="deleteBus('${b.id}')">Delete</button>
          </td>
        </tr>`).join('')}
      </tbody>
    </table></div>`;
  } catch(e) { showToast('Failed: ' + e.message, 'error'); }
}

function openModal() { editId=null; document.getElementById('modalTitle').textContent='Add New Bus'; document.getElementById('busModal').classList.add('active'); document.getElementById('saveBusBtn').textContent='Add Bus'; clearForm(); }
function closeModal() { document.getElementById('busModal').classList.remove('active'); }
function clearForm() { ['busName','busNum','busType','seatType','totalSeats','amenities'].forEach(id=>{ const el=document.getElementById(id); if(el) el.value=''; }); }

function editBus(b) {
  editId = b.id;
  document.getElementById('modalTitle').textContent = 'Edit Bus';
  document.getElementById('busName').value = b.bus_name;
  document.getElementById('busNum').value = b.bus_number;
  document.getElementById('busType').value = b.bus_type;
  document.getElementById('seatType').value = b.seating_type;
  document.getElementById('totalSeats').value = b.total_seats;
  document.getElementById('amenities').value = (Array.isArray(b.amenities)?b.amenities:JSON.parse(b.amenities||'[]')).join(', ');
  document.getElementById('saveBusBtn').textContent = 'Update Bus';
  document.getElementById('busModal').classList.add('active');
}

async function saveBus() {
  const payload = {
    bus_name: document.getElementById('busName').value.trim(),
    bus_number: document.getElementById('busNum').value.trim().toUpperCase(),
    bus_type: document.getElementById('busType').value,
    seating_type: document.getElementById('seatType').value,
    total_seats: parseInt(document.getElementById('totalSeats').value),
    amenities: document.getElementById('amenities').value.split(',').map(s=>s.trim()).filter(Boolean)
  };
  const alertEl = document.getElementById('modalAlert');
  if (!payload.bus_name || !payload.bus_number || !payload.bus_type || !payload.total_seats) { alertEl.textContent='Fill required fields'; alertEl.style.display=''; return; }
  alertEl.style.display='none';
  const btn = document.getElementById('saveBusBtn'); btn.disabled=true;
  try {
    if (editId) await apiCall(`/operators/buses/${editId}`, { method:'PUT', body:{...payload, is_active:true} });
    else await apiCall('/operators/buses', { method:'POST', body:payload });
    showToast(`Bus ${editId?'updated':'added'} successfully!`, 'success');
    closeModal(); loadBuses();
  } catch(e) { alertEl.textContent=e.message; alertEl.style.display=''; }
  btn.disabled=false;
}

async function deleteBus(id) {
  if (!confirm('Delete this bus?')) return;
  try { await apiCall(`/operators/buses/${id}`, { method:'DELETE' }); showToast('Bus deleted', 'success'); loadBuses(); }
  catch(e) { showToast(e.message, 'error'); }
}

loadBuses();
</script>
</body>

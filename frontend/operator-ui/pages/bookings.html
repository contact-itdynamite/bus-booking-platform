<body>
<aside class="sidebar">
  <div class="sidebar-logo">🚌 Bus<span>Connect</span></div>
  <nav class="sidebar-nav">
    <a href="dashboard.html"><span class="icon">📊</span><span>Dashboard</span></a>
    <a href="buses.html"><span class="icon">🚌</span><span>My Buses</span></a>

  </nav>
  <div class="sidebar-footer">
    <div class="sidebar-user" id="sidebarUser"><strong>Operator</strong></div>
    <button class="btn btn-ghost btn-sm" onclick="logout()" style="width:100%;">Logout</button>
  </div>
</aside>
<main class="main-content">
  <h1 class="page-title">Bookings</h1>
  <p class="page-subtitle">All passenger bookings</p>

  <div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;">
    <button class="btn btn-accent btn-sm" onclick="load(1,'')">All</button>
    <button class="btn btn-ghost btn-sm" onclick="load(1,'CONFIRMED')">Confirmed</button>
    <button class="btn btn-ghost btn-sm" onclick="load(1,'PENDING')">Pending</button>
    <button class="btn btn-ghost btn-sm" onclick="load(1,'CANCELLED')">Cancelled</button>
  </div>

  <div class="card">
    <div style="overflow-x:auto;">
      <table class="data-table">
        <thead><tr><th>Reference</th><th>Passenger</th><th>Route</th><th>Departure</th><th>Seats</th><th>Amount</th><th>Status</th></tr></thead>
        <tbody id="tbody"><tr><td colspan="7" style="text-align:center;padding:32px;">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>
</main>
<script src="../js/app.js"></script>
<script>
async function load(page=1, status='') {
  if (!requireAuth()) return;
  try {
    let url = `/bookings/operator/all?page=${page}&limit=20`;
    if (status) url += `&status=${status}`;
    const data = await apiCall(url);
    const bm = { CONFIRMED:'badge-green', PENDING:'badge-orange', CANCELLED:'badge-red', COMPLETED:'badge-blue' };
    document.getElementById('tbody').innerHTML = data.length ? data.map(b=>`
      <tr>
        <td><strong style="color:#2557a7;">${b.booking_reference}</strong></td>
        <td>${b.user_name}<br><small style="color:#64748b;">${b.user_email}</small></td>
        <td style="font-size:13px;">${b.source_city} → ${b.destination_city}</td>
        <td style="font-size:13px;">${fmtDateTime(b.departure_time)}</td>
        <td>${JSON.parse(b.seats_booked||'[]').join(', ')}</td>
        <td><strong>${fmtINR(b.final_amount)}</strong></td>
        <td><span class="badge ${bm[b.status]||'badge-gray'}">${b.status}</span></td>
      </tr>`).join('') : '<tr><td colspan="7" style="text-align:center;padding:32px;color:#64748b;">No bookings found</td></tr>';
  } catch(e) { showToast('Failed: '+e.message,'error'); }
}
load();
</script>
</body>

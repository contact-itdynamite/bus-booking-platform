<aside class="sidebar">
  <div class="sidebar-logo">🚌 Bus<span>Connect</span></div>
  <nav class="sidebar-nav">
    <a href="dashboard.html"><span class="icon">📊</span><span>Dashboard</span></a>

    <div class="sidebar-user" id="sidebarUser"><strong>Operator</strong></div>
    <button class="btn btn-ghost btn-sm" onclick="logout()" style="width:100%;">Logout</button>
  </div>
</aside>
<main class="main-content">
  <h1 class="page-title">Wallet</h1>
  <p class="page-subtitle">Earnings &amp; transaction history</p>

  <div class="wallet-banner">
    <div style="font-size:12px;letter-spacing:1px;opacity:0.8;text-transform:uppercase;margin-bottom:6px;">Available Balance (after 10% commission)</div>
    <div style="font-family:'Syne',sans-serif;font-size:44px;font-weight:800;" id="walBal">₹—</div>
  </div>

  <div class="card">
    <h3 class="card-title">Transaction History</h3>
    <div style="overflow-x:auto;">
      <table class="data-table">
        <thead><tr><th>Date</th><th>Description</th><th>Type</th><th>Amount</th><th>Balance</th></tr></thead>
        <tbody id="txBody"><tr><td colspan="5" style="text-align:center;padding:32px;">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>
</main>
<script src="../js/app.js"></script>
<script>
async function init() {
  if (!requireAuth()) return;
  try {
    const [w, txData] = await Promise.all([apiCall('/wallet/balance'), apiCall('/wallet/transactions?limit=50')]);
    document.getElementById('walBal').textContent = fmtINR(w.balance);
    const txs = txData.transactions || [];
    document.getElementById('txBody').innerHTML = txs.length ? txs.map(t=>`
      <tr>
        <td style="font-size:13px;">${fmtDateTime(t.created_at)}</td>
        <td>${t.description||t.reference_type||'—'}</td>
        <td><span class="badge ${t.type==='CREDIT'?'badge-green':'badge-red'}">${t.type}</span></td>
        <td style="font-weight:700;color:${t.type==='CREDIT'?'#059669':'#dc2626'};">${t.type==='CREDIT'?'+':'−'}${fmtINR(t.amount)}</td>
        <td><strong>${fmtINR(t.balance_after)}</strong></td>
      </tr>`).join('') : '<tr><td colspan="5" style="text-align:center;padding:32px;color:#64748b;">No transactions yet</td></tr>';
  } catch(e) { showToast('Failed: '+e.message,'error'); }
}
init();
</script>
</body>

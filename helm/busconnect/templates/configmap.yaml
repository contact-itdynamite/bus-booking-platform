apiVersion: v1
kind: ConfigMap
metadata:
  name: busconnect-config
  namespace: {{ include "busconnect.namespace" . }}
  labels:
    {{- include "busconnect.labels" . | nindent 4 }}
data:
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  DB_NAME: {{ .Values.postgres.database | quote }}
  DB_USER: {{ .Values.postgres.user | quote }}
  AUTH_SERVICE_URL:         "http://auth-service:{{ .Values.services.auth.port }}"
  USER_SERVICE_URL:         "http://user-service:{{ .Values.services.user.port }}"
  OPERATOR_SERVICE_URL:     "http://operator-service:{{ .Values.services.operator.port }}"
  BOOKING_SERVICE_URL:      "http://booking-service:{{ .Values.services.booking.port }}"
  WALLET_SERVICE_URL:       "http://wallet-service:{{ .Values.services.wallet.port }}"
  PROMO_SERVICE_URL:        "http://promo-service:{{ .Values.services.promo.port }}"
  ADMIN_SERVICE_URL:        "http://admin-service:{{ .Values.services.admin.port }}"
  NOTIFICATION_SERVICE_URL: "http://notification-service:{{ .Values.services.notification.port }}"
  COMMISSION_RATE:          {{ .Values.services.wallet.commissionRate | quote }}
  SIGNUP_BONUS:             {{ .Values.services.wallet.signupBonus | quote }}
  SMTP_HOST:                {{ .Values.services.notification.smtpHost | quote }}
  SMTP_PORT:                {{ .Values.services.notification.smtpPort | quote }}

{{- if .Values.apiGateway.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: {{ include "busconnect.namespace" . }}
  labels:
    app.kubernetes.io/name: api-gateway
    {{- include "busconnect.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.apiGateway.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: "{{ .Values.global.imageRegistry }}{{ .Values.apiGateway.image }}:{{ .Values.global.imageTag | default "latest" }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.apiGateway.port }}
          env:
            - name: PORT
              value: {{ .Values.apiGateway.port | quote }}
            - name: RATE_LIMIT_MAX
              value: {{ .Values.apiGateway.rateLimitMax | quote }}
            - name: RATE_LIMIT_WINDOW_MS
              value: {{ .Values.apiGateway.rateLimitWindowMs | quote }}
            {{- include "busconnect.commonEnv" . | nindent 12 }}
          resources:
            {{- toYaml .Values.apiGateway.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.apiGateway.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.apiGateway.port }}
            initialDelaySeconds: 30
            periodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: {{ include "busconnect.namespace" . }}
  labels:
    app.kubernetes.io/name: api-gateway
    {{- include "busconnect.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: api-gateway
  ports:
    - name: http
      port: {{ .Values.apiGateway.service.port }}
      targetPort: {{ .Values.apiGateway.port }}
  type: {{ .Values.apiGateway.service.type }}

{{- if .Values.apiGateway.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: busconnect-ingress
  namespace: {{ include "busconnect.namespace" . }}
  labels:
    {{- include "busconnect.labels" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    nginx.ingress.kubernetes.io/rate-limit: "on"
    nginx.ingress.kubernetes.io/limit-rps: "50"
spec:
  ingressClassName: {{ .Values.apiGateway.ingress.className }}
  {{- if .Values.apiGateway.ingress.tlsSecret }}
  tls:
    - hosts:
        - {{ .Values.apiGateway.ingress.host }}
      secretName: {{ .Values.apiGateway.ingress.tlsSecret }}
  {{- end }}
  rules:
    - host: {{ .Values.apiGateway.ingress.host }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: {{ .Values.apiGateway.service.port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
{{- end }}
{{- end }}
